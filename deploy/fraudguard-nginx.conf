server {
    listen 80;
    server_name 111.230.114.42;

    root /var/www/fraudguard;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /pharmacist/ {
        alias /var/www/pharmacist-exam/;
        index index.html;
        try_files $uri $uri/ /pharmacist/index.html;

        # TTS 代理：转发到本地 Python 服务（端口 8787），为 pharmacist 子路径下的页面提供云端语音
        location ^~ /pharmacist/api/tts/ {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            proxy_pass http://127.0.0.1:8787/;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            expires 1h;
            add_header Cache-Control 'public';
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
